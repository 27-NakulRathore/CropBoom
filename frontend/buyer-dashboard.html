<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyer Marketplace | CropBoom</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-white shadow-md px-8 py-4 sticky top-0 z-50 flex justify-between items-center border-b border-green-100">
        <div class="text-2xl font-black text-green-600 flex items-center gap-2 italic cursor-pointer" onclick="location.reload()">
            <i class="fas fa-seedling"></i> CropBoom
        </div>
        <div class="flex-1 max-w-md mx-8">
            <div class="relative">
                <i class="fas fa-search absolute left-4 top-3 text-gray-400"></i>
                <input type="text" id="searchInput" onkeyup="filterCrops()" placeholder="Search by crop or city..." 
                    class="w-full pl-12 pr-4 py-2 bg-gray-100 border-none rounded-full focus:ring-2 focus:ring-green-500 outline-none transition">
            </div>
        </div>
        <div class="flex items-center gap-6">
            <button onclick="toggleCart()" class="relative text-gray-600 hover:text-green-600 transition">
                <i class="fas fa-shopping-basket text-2xl"></i>
                <span id="cartCount" class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] font-bold rounded-full w-5 h-5 flex items-center justify-center border-2 border-white">0</span>
            </button>
            <button onclick="logout()" class="text-sm font-black uppercase text-gray-400 hover:text-red-500">Logout</button>
        </div>
    </nav>

    <main class="p-8 max-w-7xl mx-auto">
        <header class="mb-10 flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-black text-gray-800 italic">Fresh <span class="text-green-600 underline">MARKET</span></h1>
                <p class="text-gray-500 font-medium">Direct harvest from local farmers to your doorstep.</p>
            </div>
        </header>
        <div id="cropGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
    </main>

    <div id="cartSidebar" class="fixed right-0 top-0 h-full w-96 bg-white shadow-2xl transform translate-x-full transition-transform duration-500 z-[60] flex flex-col border-l">
        <div class="p-8 border-b flex justify-between items-center bg-gray-900 text-white rounded-bl-[40px]">
            <h3 class="text-xl font-black uppercase italic tracking-tighter">Your <span class="text-green-400">Basket</span></h3>
            <button onclick="toggleCart()" class="text-2xl opacity-50">&times;</button>
        </div>
        <div id="cartItems" class="flex-1 overflow-y-auto p-6 space-y-6"></div>
        <div class="p-8 bg-gray-50 rounded-tl-[40px]">
            <div class="flex justify-between mb-6 font-black text-2xl text-gray-800">
                <span>TOTAL</span><span id="cartTotal" class="text-green-600">₹0</span>
            </div>
            <button onclick="proceedToCheckout()" class="w-full bg-green-600 text-white py-5 rounded-2xl font-black uppercase shadow-xl hover:bg-green-700 active:scale-95 transition">Place Order</button>
        </div>
    </div>

    <div id="chatBox" class="fixed bottom-6 right-6 w-80 bg-white shadow-2xl rounded-2xl hidden z-[70] border overflow-hidden">
        <div class="bg-green-600 p-4 text-white flex justify-between items-center">
            <h4 id="chatTarget" class="font-bold text-xs truncate max-w-[80%]">Chat</h4>
            <button onclick="closeChat()"><i class="fas fa-times"></i></button>
        </div>
        <div id="chatMessages" class="h-64 overflow-y-auto p-4 space-y-3 bg-gray-50 text-[10px]"></div>
        <div class="p-3 border-t flex gap-2">
            <input type="text" id="chatInput" placeholder="Ask farmer..." class="flex-1 bg-gray-100 rounded-full px-4 py-2 text-xs outline-none">
            <button onclick="sendMessage()" class="bg-green-600 text-white w-8 h-8 rounded-full"><i class="fas fa-paper-plane text-[10px]"></i></button>
        </div>
    </div>

    <script>
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if(!currentUser || currentUser.role !== 'buyer') window.location.href = 'login.html';
        let cart = [];
        let activeFarmerEmail = "";

        function loadMarketplace() {
            const crops = JSON.parse(localStorage.getItem('cropBoomItems')) || [];
            const grid = document.getElementById('cropGrid');
            grid.innerHTML = crops.map(crop => {
                const isOutOfStock = Number(crop.qty) <= 0;
                return `
                    <div class="bg-white rounded-[30px] shadow-sm hover:shadow-xl transition-all border p-6 group">
                        <div class="h-40 bg-gray-50 rounded-2xl mb-4 flex items-center justify-center relative overflow-hidden">
                            <i class="fas fa-leaf text-5xl text-green-100"></i>
                            <div class="absolute top-2 right-2 bg-white/90 px-2 py-1 rounded-full text-[8px] font-black text-green-700 border">AI VERIFIED</div>
                            ${isOutOfStock ? `<div class="absolute inset-0 bg-white/80 flex items-center justify-center font-black text-red-500">Out of Stock</div>` : ''}
                        </div>
                        <h3 class="font-black text-lg text-gray-800 uppercase truncate">${crop.name}</h3>
                        <p class="text-gray-400 text-[10px] mb-4 font-bold tracking-tighter"><i class="fas fa-map-marker-alt text-red-400 mr-1"></i> ${crop.location}</p>
                        <div class="flex justify-between items-center">
                            <span class="text-2xl font-black text-green-600">₹${crop.price}<small class="text-[10px] text-gray-400">/kg</small></span>
                            <button onclick="addToCart('${crop.id}')" ${isOutOfStock ? 'disabled' : ''} class="bg-gray-900 text-white w-10 h-10 rounded-xl hover:bg-green-600 transition shadow-lg disabled:opacity-20"><i class="fas fa-plus"></i></button>
                        </div>
                        <button onclick="openChat('${crop.farmerEmail}')" class="w-full mt-4 py-2 border border-blue-100 rounded-xl text-blue-500 text-[10px] font-black uppercase hover:bg-blue-50 transition"><i class="fas fa-comment-dots mr-2"></i> Contact Farmer</button>
                    </div>
                `;
            }).join('') || `<div class="col-span-full py-20 text-center text-gray-400 italic font-bold uppercase">Market is Empty</div>`;
        }

        function addToCart(id) {
            const crops = JSON.parse(localStorage.getItem('cropBoomItems')) || [];
            const product = crops.find(c => c.id === id);
            const existing = cart.find(i => i.id === id);
            if(existing) { if(existing.quantity < Number(product.qty)) { existing.quantity++; } else { alert("Max stock reached!"); } }
            else { cart.push({...product, quantity: 1}); }
            updateCartUI();
            if(document.getElementById('cartSidebar').classList.contains('translate-x-full')) toggleCart();
        }

        function changeQty(id, delta) {
            const crops = JSON.parse(localStorage.getItem('cropBoomItems')) || [];
            const product = crops.find(c => c.id === id);
            const item = cart.find(i => i.id === id);
            if(item) {
                const n = item.quantity + delta;
                if(n > 0 && n <= Number(product.qty)) item.quantity = n;
                else if(n > Number(product.qty)) alert("Only " + product.qty + "kg available.");
                else cart = cart.filter(i => i.id !== id);
            }
            updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById('cartItems');
            container.innerHTML = cart.map(item => `
                <div class="bg-gray-50 p-4 rounded-3xl flex items-center justify-between">
                    <div><p class="font-black text-gray-800 uppercase text-xs">${item.name}</p><p class="text-[10px] font-bold text-green-600">₹${item.price}/kg</p></div>
                    <div class="flex items-center bg-white rounded-xl border p-1">
                        <button onclick="changeQty('${item.id}', -1)" class="w-6 h-6 text-gray-400"><i class="fas fa-minus text-[8px]"></i></button>
                        <span class="px-3 font-black text-xs">${item.quantity}</span>
                        <button onclick="changeQty('${item.id}', 1)" class="w-6 h-6 text-gray-400"><i class="fas fa-plus text-[8px]"></i></button>
                    </div>
                </div>`).join('');
            document.getElementById('cartTotal').innerText = `₹` + cart.reduce((s, i) => s + (i.price * i.quantity), 0);
            document.getElementById('cartCount').innerText = cart.length;
        }

        // Chat Functions
        function openChat(farmerEmail) {
            activeFarmerEmail = farmerEmail;
            document.getElementById('chatTarget').innerText = `Chat with ${farmerEmail}`;
            document.getElementById('chatBox').classList.remove('hidden');
            renderMessages();
        }
        function closeChat() { document.getElementById('chatBox').classList.add('hidden'); }
        function sendMessage() {
            const inp = document.getElementById('chatInput');
            if(!inp.value.trim()) return;
            const msgs = JSON.parse(localStorage.getItem('cropBoomMessages')) || [];
            msgs.push({ from: currentUser.email, to: activeFarmerEmail, text: inp.value, time: new Date().toISOString(), read: false });
            localStorage.setItem('cropBoomMessages', JSON.stringify(msgs));
            inp.value = ""; renderMessages();
        }
        function renderMessages() {
            const msgs = JSON.parse(localStorage.getItem('cropBoomMessages')) || [];
            document.getElementById('chatMessages').innerHTML = msgs.filter(m => (m.from === currentUser.email && m.to === activeFarmerEmail) || (m.from === activeFarmerEmail && m.to === currentUser.email))
                .map(m => `<div class="flex ${m.from === currentUser.email ? 'justify-end' : 'justify-start'}">
                    <div class="${m.from === currentUser.email ? 'bg-green-600 text-white' : 'bg-white border'} p-2 rounded-xl max-w-[80%]">${m.text}</div>
                </div>`).join('');
            const box = document.getElementById('chatMessages'); box.scrollTop = box.scrollHeight;
        }

        function toggleCart() { document.getElementById('cartSidebar').classList.toggle('translate-x-full'); }
        function filterCrops() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('#cropGrid > div').forEach(card => card.style.display = card.innerText.toLowerCase().includes(q) ? 'block' : 'none');
        }
        function proceedToCheckout() { if(cart.length > 0) { localStorage.setItem('tempCart', JSON.stringify(cart)); window.location.href = 'checkout.html'; } }
        function logout() { localStorage.removeItem('currentUser'); window.location.href = 'login.html'; }

        loadMarketplace();
    </script>
</body>
</html>
