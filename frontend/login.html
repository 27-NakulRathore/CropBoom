<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CropBoom</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm relative">
        <a href="index.html" class="absolute top-6 left-6 text-gray-400 hover:text-green-600 transition">
            <i class="fas fa-arrow-left text-xl"></i>
        </a>

        <div class="text-center mb-8 mt-4">
            <h2 class="text-3xl font-bold text-green-700">Welcome Back</h2>
            <p class="text-gray-500">Log in to your dashboard</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <input type="email" id="loginEmail" placeholder="Email" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none">
            <input type="password" id="loginPass" placeholder="Password" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none">
            <button type="submit" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700 transition">Sign In</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const users = JSON.parse(localStorage.getItem('cropBoomUsers')) || [];
            const user = users.find(u => u.email === document.getElementById('loginEmail').value && u.pass === document.getElementById('loginPass').value);

            if (user) {
                localStorage.setItem('currentUser', JSON.stringify(user));
                window.location.href = user.role === 'farmer' ? 'farmer-dashboard.html' : 'buyer-dashboard.html';
            } else {
                alert("Invalid Credentials!");
            }
        });
    </script>
</body>
</html>
